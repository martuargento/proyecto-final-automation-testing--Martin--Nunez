name: Run API Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'
          
      - name: Install Dependences
        run: |
            python -m  pip install --upgrade pip
            pip install requests pytest selenium webdriver-manager faker

      - name: Run Test
        run: |
            pytest    


          
